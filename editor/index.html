<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>JsonEditor</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
<div class="app-container">
    <!-- 头部 + 主题切换 -->
    <div class="header">
        <div class="title">
            <h1>Json条目编辑</h1>
            <p>点击条目编辑 · 完成后上传～</p>
        </div>
        <button class="theme-toggle" id="themeToggleBtn">🌓 深色模式</button>
    </div>

    <!-- API 栏 + 操作按钮 -->
    <div class="api-bar">
        <!-- 第一行：API 密钥输入 -->
        <div class="api-field">
            <label>🔑 API 密钥 X-API-Key</label>
            <div class="api-input-row">
                <div class="key-wrapper">
                    <input type="password" id="apiKeyInput" placeholder="输入Key" autocomplete="off">
                </div>
                <label class="remember-switch">
                    <input type="checkbox" id="rememberKeyCheckbox">
                    <span>记住</span>
                </label>
            </div>
        </div>

        <!-- 第二行：操作按钮与状态 -->
        <div class="action-row">
            <div class="action-buttons">
                <button class="btn btn-secondary" id="refreshBtn">📄 重新加载</button>
                <button class="btn btn-primary" id="uploadBtn">☁️ 上传保存</button>
            </div>
            <div class="status-chip" id="liveStatus">Loading...</div>
        </div>
    </div>

    <!-- 全局提示 -->
    <div class="footer-msg" id="globalMessageContainer">
        <div class="global-message">✨ 点击卡片编辑内容，然后上传</div>
    </div>

    <!-- 卡片网格 -->
    <div id="cardsGrid" class="cards-grid">
        <!-- 动态卡片渲染 -->
    </div>

    <!-- 新增 Footer -->
    <footer class="app-footer">
        <p>该页面由Qwen3.5Plus协助IceLiuli编写.</p>
    </footer>
</div>

<!-- 编辑弹窗 -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">编辑条目</h3>
        <!-- 全局错误提示 -->
        <div id="modalError" class="modal-error"></div>
        
        <div class="input-group">
            <label>名称 (name) <span style="color:var(--danger)">*</span></label>
            <input type="text" id="editName" placeholder="请输入名称">
            <div class="input-error" id="nameError"></div>
        </div>
        <div class="input-group">
            <label>网址 (value) <span style="color:var(--danger)">*</span></label>
            <input type="text" id="editValue" placeholder="请输入地址">
            <div class="input-error" id="valueError"></div>
        </div>
        <div class="input-group">
            <label>备注 (note)</label>
            <textarea id="editNote" rows="4" placeholder="选填备注"></textarea>
        </div>
        <div class="modal-actions">
            <button class="btn btn-secondary" id="cancelModalBtn">取消</button>
            <button class="btn btn-primary" id="saveModalBtn">确定</button>
        </div>
    </div>
</div>
<script src="./main.js" defer></script>
</body>
</html>
